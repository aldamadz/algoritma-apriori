services:
  postgres:
    image: postgres:16-alpine
    container_name: apriori-postgres
    environment:
      POSTGRES_DB: apriori_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d apriori_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apriori-backend
    environment:
      APP_NAME: Apriori Engine API
      APP_ENV: production
      DEBUG: "false"
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/apriori_db
      CORS_ORIGINS: http://localhost
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: apriori-frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
